services:
  tailscale:
    image: tailscale/tailscale:latest@sha256:21df0b5a84efa35c0a507f4dd2340e1b1295683634a28968707354d5bd991d9c
    container_name: markcards-tailscale
    restart: unless-stopped
    hostname: ${VM_NAME:-markcards}-gw
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - tailscale_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    dns:
      - 1.1.1.1
      - 1.0.0.1
    networks:
      - proxy_net
      - internal_net
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 10s
      timeout: 5s
      retries: 6

  caddy:
    build: ./.deploy/gateway
    container_name: markcards-gateway
    restart: unless-stopped
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_healthy
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - CADDY_ADMIN=:2019
    volumes:
      - ./.deploy/gateway/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    environment:
      - GITHUB_REPO=${GITHUB_REPO}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_PATH=cards
    volumes:
      - markcards_data:/data
    restart: unless-stopped
    networks:
      - internal_net

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    restart: unless-stopped
    networks:
      - internal_net

  telegram-bot:
    build:
      context: apps/telegram-bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_GEMINI_API_KEY=${GOOGLE_GEMINI_API_KEY}
      - ALLOWED_USER_IDS=${ALLOWED_USER_IDS:-}
      - MARKCARDS_API_URL=http://server:3000
      - GITHUB_REPO=${GITHUB_REPO}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_PATH=${GITHUB_PATH:-cards}
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - internal_net

volumes:
  markcards_data:
  tailscale_state:
  caddy_data:
  caddy_config:

networks:
  proxy_net:
  internal_net:
